name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend — lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: calllens
          POSTGRES_PASSWORD: calllens
          POSTGRES_DB: calllens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U calllens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src/

      - name: pytest
        run: uv run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://calllens:calllens@localhost:5432/calllens
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: development
          JWT_SECRET: ci-test-secret
          APP_SECRET_KEY: ci-test-secret
