# ── CallLens — Full-Stack Docker Compose ─────────────────────────────
#
# Quick start:
#   cp .env.example .env
#   docker compose up --build
#
# App at http://localhost:3000, API docs at http://localhost:8000/docs.
# Demo data is auto-seeded on first boot (SEED_DEMO_ON_START=true).
#
# Infra-only (for native dev with uv + npm):
#   docker compose up postgres redis
#
# Reset everything (including data):
#   docker compose down -v

services:
  # ── Postgres + pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calllens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Database migrations (run once and exit) ──────────────────────
  migrate:
    build:
      context: backend
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── FastAPI backend ──────────────────────────────────────────────
  api:
    build:
      context: backend
      dockerfile: Dockerfile
    command:
      [
        "uvicorn", "calllens.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--workers", "${WEB_CONCURRENCY:-1}",
      ]
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Celery worker ────────────────────────────────────────────────
  # Shares the storage volume so it can read audio files written by api
  worker:
    build:
      context: backend
      dockerfile: Dockerfile
    command:
      [
        "celery", "-A", "calllens.tasks.celery_app:celery_app",
        "worker",
        "--concurrency", "${CELERY_CONCURRENCY:-1}",
        "--loglevel", "info",
      ]
    env_file: .env
    volumes:
      - storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Next.js frontend ────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://api:8000
    environment:
      - BACKEND_URL=http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  storage:
